name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm test

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test/artifacts/
          retention-days: 7

      # Keeps badges/coverage.json (the README coverage badge) in sync.
      # Only on pushes to main/develop, not on PRs from forks.
      - if: success() && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: badges/coverage.json
